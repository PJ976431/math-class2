<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>平面图形复习 - 学生端</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4F8EF7; --secondary: #FFB347; --accent: #77DD77;
            --danger: #FF6961; --bg: #F4F7F6; --card: #FFFFFF;
            --text: #2D3748; --grid-color: rgba(0, 0, 0, 0.08);
        }
        * {
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none;
            -webkit-user-select: none; user-select: none;
        }
        html, body {
            width: 100%; min-height: 100vh;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg); color: var(--text); overflow-x: hidden;
        }

        .page { display: none; flex-direction: column; min-height: 100vh; }
        .page.active { display: flex; }

        #page1 { justify-content: center; align-items: center; padding: 30px 20px; gap: 40px; }
        #page1 .header h1 { font-size: 32px; color: #2196F3; letter-spacing: 4px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        #page1 .selection-text {
            font-size: 24px; font-weight: bold; color: #546E7A;
            background: white; padding: 20px 40px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .shape-selector-page1 { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .shape-btn-large {
            width: 160px; height: 90px; border: 3px solid var(--primary); background: white;
            border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; color: var(--primary); transition: all 0.2s;
            box-shadow: 0 6px 15px rgba(79, 142, 247, 0.2);
        }
        .shape-btn-large:active { transform: scale(0.95); background: var(--primary); color: white; }

        #page2 { padding: 15px; gap: 12px; }
        .container { max-width: 800px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 12px; }
        
        .selection-text {
            background: var(--card); padding: 14px; border-radius: 12px; text-align: center;
            font-size: 20px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: #546E7A;
        }
        .selected-shape-name {
            color: var(--danger); border-bottom: 3px dashed var(--danger);
            padding: 0 8px 2px; min-width: 90px; display: inline-block;
        }

        .requirements {
            background: rgba(255,255,255,0.9); padding: 12px 15px; border-radius: 10px;
            text-align: left; font-size: 14px; line-height: 1.6; color: #455A64; border-left: 4px solid #FF9800;
        }
        .requirements h3 { color: #FF9800; margin-bottom: 5px; font-size: 15px; }
        .requirements ol { padding-left: 18px; }

        .target-shapes-area {
            background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .target-shapes-list { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .target-shape-btn {
            width: 75px; height: 60px; border: 2px dashed #B0BEC5; background: #FAFAFA;
            border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .target-shape-btn:active { background: #E3F2FD; border-color: var(--primary); transform: scale(0.95); }
        .target-shape-btn svg { width: 55px; height: 45px; }

        .canvas-area {
            background: var(--card); border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            overflow: hidden; border: 3px solid #E3F2FD; display: flex; flex-direction: column;
        }
        .canvas-container-wrapper {
            height: 450px; position: relative; overflow: hidden; background-color: #fff;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px; 
        }
        
        .toolbar {
            display: flex; flex-wrap: wrap; gap: 8px; padding: 10px;
            background: #F8F9FA; border-top: 1px solid #EEEEEE; justify-content: center;
        }
        .tool-btn {
            padding: 8px 12px; border: none; border-radius: 18px; background: white;
            color: var(--text); font-size: 13px; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            display: flex; align-items: center; gap: 4px; transition: all 0.2s; cursor: pointer;
        }
        .tool-btn:active { transform: scale(0.95); background: #E9ECEF; }
        .tool-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(79, 142, 247, 0.4); }
        .tool-btn.danger { color: var(--danger); }
        .tool-btn.accent { color: #00897B; }
        .tool-btn.warning { color: #F57C00; }

        .footer { padding: 5px 0 20px; }
        .submit-btn {
            width: 100%; padding: 16px; font-size: 20px; font-weight: bold; color: white;
            background: linear-gradient(135deg, #43E97B 0%, #38F9D7 100%); border: none;
            border-radius: 14px; box-shadow: 0 6px 20px rgba(67, 233, 123, 0.4); letter-spacing: 3px; cursor: pointer;
        }
        .submit-btn:active { transform: scale(0.98); }

        .work-preview-box {
            display: none; 
            background: var(--card); padding: 15px; border-radius: 12px; 
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px dashed var(--accent); margin-top: 10px;
        }
        .work-preview-box.show { display: block; }
        .preview-title { font-size: 16px; font-weight: bold; color: #2E7D32; margin-bottom: 10px; }
        #previewImg { 
            max-width: 100%; max-height: 200px; border-radius: 8px; 
            border: 1px solid #eee; cursor: pointer; transition: transform 0.2s;
        }
        #previewImg:active { transform: scale(0.98); }
        .delete-work-btn {
            margin-top: 12px; padding: 10px 24px; background: var(--danger); color: white;
            border: none; border-radius: 20px; font-size: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 105, 97, 0.3);
        }
        .delete-work-btn:active { transform: scale(0.95); }

        .student-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9998; justify-content: center; align-items: center;
        }
        .student-modal.show { display: flex; }
        .student-modal img { max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .modal-close {
            position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer;
            background: rgba(255,255,255,0.15); width: 50px; height: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
        }

        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(45, 55, 72, 0.9); color: white; padding: 12px 24px; border-radius: 10px;
            font-size: 15px; z-index: 9999; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="page1" class="page active">
    <div class="header"><h1>📐 平面图形复习 📐</h1></div>
    <div class="selection-text">我选择 <span class="selected-shape-name">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> 作为基础图形。</div>
    <div class="shape-selector-page1">
        <div class="shape-btn-large" onclick="selectShape('parallelogram')">平行四边形</div>
        <div class="shape-btn-large" onclick="selectShape('triangle')">三角形</div>
        <div class="shape-btn-large" onclick="selectShape('trapezoid')">梯形</div>
    </div>
</div>

<div id="page2" class="page">
    <div class="container">
        <div class="selection-text">转化为 <span class="selected-shape-name" id="targetShapeText">___</span></div>
        
        <div class="requirements">
            <h3>📢 活动要求：</h3>
            <ol>
                <li>想一想：如何转化成基础图形。</li>
                <li>画一画：转化的过程。</li>
                <li>说一说：转化后图形与原图形的联系。</li>
            </ol>
        </div>

        <div class="target-shapes-area">
            <div class="target-shapes-list" id="targetShapesList"></div>
        </div>

        <div class="canvas-area">
            <div class="canvas-container-wrapper" id="canvasWrapper">
                <canvas id="mainCanvas"></canvas>
            </div>
            <div class="toolbar">
                <button class="tool-btn" onclick="undo()">↩️ 撤销</button>
                <button class="tool-btn danger" onclick="resetCanvas()">🔄 重置</button>
                <button class="tool-btn active" id="btnSelect" onclick="setMode('select')">👆 选中</button>
                <button class="tool-btn" id="btnMove" onclick="setMode('move')">✋ 移动</button>
                <button class="tool-btn" id="btnCut" onclick="setMode('cut')">✂️ 剪切</button>
                <button class="tool-btn" onclick="copyObj()">📋 复制</button>
                <button class="tool-btn danger" onclick="deleteObj()">🗑️ 删除</button>
                <button class="tool-btn" onclick="rotateObj()">🔄 旋转</button>
                <button class="tool-btn" onclick="flipX()">↔️ 水平翻转</button>
                <button class="tool-btn" onclick="flipY()">↕️ 垂直翻转</button>
                <button class="tool-btn accent" onclick="saveTrace()">📌 保留痕迹</button>
                <button class="tool-btn warning" onclick="toggleLock()">🔒 固定</button>
                <button class="tool-btn" onclick="unlockAll()">🔓 解除所有固定</button>
            </div>
        </div>
    </div>

    <div class="container footer">
        <button class="submit-btn" onclick="submitWork()">📤 上传提交作品</button>
        
        <div id="workPreviewBox" class="work-preview-box">
            <div class="preview-title">✅ 已上传作品 (点击可放大)</div>
            <img id="previewImg" src="" alt="我的作品" onclick="openStudentModal()">
            <br>
            <button class="delete-work-btn" onclick="deleteMyWork()">🗑️ 删除作品并重新提交</button>
        </div>
    </div>
</div>

<div id="studentModal" class="student-modal" onclick="closeStudentModal(event)">
    <span class="modal-close">&times;</span>
    <img id="modalImg" src="" alt="放大查看">
</div>

<div class="toast" id="toast"></div>

<script>
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    let currentGroupName = '未知小组';
    if (user.username && user.username.startsWith('group')) {
        const num = parseInt(user.username.replace('group', ''));
        const numMap = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
        currentGroupName = `第${numMap[num-1] || num}小组`;
    }

    const wrapper = document.getElementById('canvasWrapper');
    const canvas = new fabric.Canvas('mainCanvas', { 
        backgroundColor: 'transparent', 
        selection: true, 
        preserveObjectStacking: true 
    });
    
    fabric.Object.prototype.setControlsVisibility({
        tl: false, tr: false, bl: false, br: false, 
        ml: false, mr: false, mt: false, mb: false, 
        mtr: true 
    });

    const GRID_SIZE = 30; 
    
    // 【核心修改】：使用更稳定纯粹的 historyStack 栈结构
    let historyStack = [], isRestoring = false, isCutting = false, currentMode = 'select';
    let currentShapeType = '';
    let cutLine = null, cutStart = null, cutEnd = null;
    let myWorkId = null; 

    const SHAPE_POINTS = {
        rectangle: [{x:0,y:0}, {x:120,y:0}, {x:120,y:90}, {x:0,y:90}], 
        square: [{x:0,y:0}, {x:90,y:0}, {x:90,y:90}, {x:0,y:90}],      
        parallelogram: [{x:30,y:0}, {x:150,y:0}, {x:120,y:90}, {x:0,y:90}], 
        triangle: [{x:60,y:0}, {x:90,y:120}, {x:0,y:120}],              
        trapezoid: [{x:60,y:0}, {x:120,y:0}, {x:150,y:120}, {x:0,y:120}]  
    };

    const SHAPE_NAMES = { rectangle: '长方形', square: '正方形', parallelogram: '平行四边形', triangle: '三角形', trapezoid: '梯形' };
    const SHAPE_COLORS = { rectangle: '#FFDAC1', square: '#E2F0CB', parallelogram: '#C7CEEA', triangle: '#B5EAD7', trapezoid: '#FFB7B2' };

    function getShapeSVG(type) {
        const color = SHAPE_COLORS[type];
        const paths = {
            rectangle: '<polygon points="22,22 82,22 82,67 22,67" />',
            square: '<polygon points="30,22 75,22 75,67 30,67" />',
            parallelogram: '<polygon points="37,22 97,22 82,67 22,67" />',
            triangle: '<polygon points="60,15 75,75 30,75" />',
            trapezoid: '<polygon points="52,15 82,15 97,75 22,75" />'
        };
        return `<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg"><g fill="${color}" stroke="#333" stroke-width="2.5" stroke-linejoin="round" opacity="0.5">${paths[type]}</g></svg>`;
    }

    function resizeCanvas() {
        if (wrapper.clientWidth > 0) {
            canvas.setWidth(wrapper.clientWidth);
            canvas.setHeight(wrapper.clientHeight);
            canvas.renderAll();
        }
    }
    window.addEventListener('resize', resizeCanvas);
    function snapToGrid(value) { return Math.round(value / GRID_SIZE) * GRID_SIZE; }

    function getAbsolutePoints(obj) {
        const points = obj.points;
        const matrix = obj.calcTransformMatrix();
        const pathOffset = obj.pathOffset || { x: 0, y: 0 };
        return points.map(p => fabric.util.transformPoint({ x: p.x - pathOffset.x, y: p.y - pathOffset.y }, matrix));
    }

    function updateTraceState(obj) {
        obj._lastTraceState = { left: obj.left, top: obj.top, angle: obj.angle };
        if (obj._hasAutoTraced === undefined) obj._hasAutoTraced = false;
    }

    function selectShape(type) {
        currentShapeType = type;
        document.getElementById('targetShapeText').innerText = SHAPE_NAMES[type];
        document.getElementById('page1').classList.remove('active');
        document.getElementById('page2').classList.add('active');
        setTimeout(() => {
            resizeCanvas();
            addShapeToCanvas(type, true, null); 
            
            const list = document.getElementById('targetShapesList');
            list.innerHTML = '';
            const positions = ['top-left', 'top-right', 'bottom-left', 'bottom-right'];
            let posIndex = 0;
            
            Object.keys(SHAPE_NAMES).forEach(key => {
                if (key !== type) {
                    const btn = document.createElement('div');
                    btn.className = 'target-shape-btn';
                    btn.innerHTML = getShapeSVG(key); 
                    const pos = positions[posIndex % 4];
                    btn.onclick = () => addShapeToCanvas(key, false, pos);
                    list.appendChild(btn);
                    posIndex++;
                }
            });
            setMode('select'); 
        }, 100);
    }

    function addShapeToCanvas(type, isBase, position) {
        const center = { x: canvas.width / 2, y: canvas.height / 2 };
        const points = SHAPE_POINTS[type];
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        points.forEach(p => { if(p.x < minX) minX = p.x; if(p.y < minY) minY = p.y; if(p.x > maxX) maxX = p.x; if(p.y > maxY) maxY = p.y; });
        const w = maxX - minX, h = maxY - minY;

        let left, top;
        if (isBase) {
            left = snapToGrid(center.x - w / 2);
            top = snapToGrid(center.y - h / 2);
        } else {
            const offset = 180; 
            let targetX = center.x, targetY = center.y;
            if (position === 'top-left') { targetX -= offset; targetY -= offset; targetY += 60; } 
            else if (position === 'top-right') { targetX += offset; targetY -= offset; targetY += 60; } 
            else if (position === 'bottom-left') { targetX -= offset; targetY += offset; targetY -= 30; } 
            else if (position === 'bottom-right') { targetX += offset; targetY += offset; targetY -= 60; } 
            
            left = snapToGrid(targetX - w / 2);
            top = snapToGrid(targetY - h / 2);
        }

        const shape = new fabric.Polygon(points, {
            fill: SHAPE_COLORS[type], stroke: '#333', strokeWidth: 2,
            left: left, top: top, 
            shapeType: type, isBase: isBase, 
            opacity: 0.5, 
            lockScalingX: true, lockScalingY: true, lockScalingFlip: true, 
            hasControls: true, hasBorders: true,
            perPixelTargetFind: true, targetFindTolerance: 5 
        });

        if (isBase) {
            shape.set({ 
                lockMovementX: true, lockMovementY: true, lockRotation: true,
                hasControls: false, hasBorders: false,
                selectable: false, evented: false 
            });
        } else {
            const canMove = (currentMode === 'move');
            shape.set({ lockMovementX: !canMove, lockMovementY: !canMove, lockRotation: false });
        }
        
        canvas.add(shape);
        updateTraceState(shape); 
        if (!isBase) canvas.setActiveObject(shape);
        saveState(); // 添加图形后保存状态
    }

    canvas.on('object:rotating', function(opt) {
        const obj = opt.target;
        let angle = obj.angle % 360;
        if (angle < 0) angle += 360;
        const snapAngles = [0, 90, 180, 270];
        for (let snap of snapAngles) {
            if (Math.abs(angle - snap) < 10) {
                obj.rotate(snap);
                break;
            }
        }
    });

    canvas.on('object:modified', function(opt) {
        const obj = opt.target;
        if (!obj || obj.isTrace || !obj._lastTraceState) return; 
        
        const state = obj._lastTraceState;
        const hasChanged = (obj.left !== state.left || obj.top !== state.top || obj.angle !== state.angle);
        
        if (hasChanged) {
            if (obj.isCutPart && !obj._hasAutoTraced) {
                createGhostTrace(obj, state);
                obj._hasAutoTraced = true; 
            }
            updateTraceState(obj); 
            saveState(); // 移动/旋转结束后保存状态
        }
    });

    function setMode(mode) {
        currentMode = mode;
        canvas.selection = (mode !== 'cut'); 
        canvas.getObjects().forEach(obj => {
            if (obj.isBase) return; 
            if (obj._isLocked) { 
                obj.set({ lockMovementX: true, lockMovementY: true }); 
            } else {
                const canMove = (mode === 'move');
                obj.set({ lockMovementX: !canMove, lockMovementY: !canMove });
            }
        });
        if (mode === 'cut') {
            canvas.defaultCursor = 'crosshair'; canvas.hoverCursor = 'crosshair';
            showToast('✂️ 剪切模式：指哪切哪，绝不延伸误伤');
        } else {
            canvas.defaultCursor = 'default'; canvas.hoverCursor = 'move';
            showToast(mode === 'move' ? '✋ 移动模式：自由拖拽无吸附' : '👆 选中模式：仅可选中操作');
        }
        document.getElementById('btnSelect').classList.toggle('active', mode === 'select');
        document.getElementById('btnMove').classList.toggle('active', mode === 'move');
        document.getElementById('btnCut').classList.toggle('active', mode === 'cut');
        canvas.renderAll();
    }

    // 【核心修改】：重构历史记录管理，移除全局监听，采用精准手动保存
    function saveState() {
        if (isRestoring || isCutting) return; 
        const stateStr = JSON.stringify(canvas.toJSON(['shapeType', 'isCutPart', 'isBase', 'isTrace', '_lastTraceState', '_hasAutoTraced', '_isLocked']));
        historyStack.push(stateStr);
        
        // 限制最大撤销步数，防止内存溢出
        if (historyStack.length > 50) {
            historyStack.shift();
        }
    }

    function undo() {
        // 如果栈里只有1个状态（即初始状态），则无法再撤销
        if (historyStack.length <= 1) {
            return showToast('已经到最初状态啦');
        }
        
        // 弹出当前状态
        historyStack.pop();
        // 获取上一步状态
        const prevState = historyStack[historyStack.length - 1];
        
        isRestoring = true;
        canvas.clear();
        canvas.loadFromJSON(prevState, () => { 
            canvas.renderAll(); 
            isRestoring = false; 
            setMode(currentMode);
            canvas.getObjects().forEach(obj => {
                if (obj.type === 'polygon' && !obj._lastTraceState) updateTraceState(obj);
            });
        });
    }

    function resetCanvas() {
        if (confirm('确定要重置画布吗？所有操作将清空。')) {
            canvas.clear(); 
            historyStack = []; // 清空历史栈
            if (currentShapeType) addShapeToCanvas(currentShapeType, true, null);
            setMode('select');
        }
    }

    // 【核心修改】：补全 deleteObj 中的 saveState 调用
    function deleteObj() { 
        const obj = canvas.getActiveObject(); 
        if (obj && !obj.isBase) { 
            canvas.remove(obj); 
            saveState(); 
        } else {
            showToast('请先选中非基础图形');
        } 
    }
    
    function rotateObj() { const obj = canvas.getActiveObject(); if (obj && !obj.isBase) { obj.rotate((obj.angle || 0) + 90); canvas.renderAll(); saveState(); } else showToast('基础图形不可旋转'); }
    function flipX() { const obj = canvas.getActiveObject(); if (obj && !obj.isBase) { obj.set('flipX', !obj.flipX); canvas.renderAll(); saveState(); } }
    function flipY() { const obj = canvas.getActiveObject(); if (obj && !obj.isBase) { obj.set('flipY', !obj.flipY); canvas.renderAll(); saveState(); } }
    
    function copyObj() {
        const obj = canvas.getActiveObject();
        if (!obj) return showToast('请先选中图形');
        obj.clone(function(cloned) {
            cloned.set({ left: obj.left + 20, top: obj.top + 20, isBase: false, isTrace: false, _isLocked: false });
            const canMove = (currentMode === 'move');
            cloned.set({ 
                lockMovementX: !canMove, lockMovementY: !canMove, 
                lockScalingX: true, lockScalingY: true, lockScalingFlip: true, 
                lockRotation: false, hasControls: true,
                perPixelTargetFind: true, targetFindTolerance: 5
            });
            canvas.add(cloned); 
            updateTraceState(cloned); 
            canvas.setActiveObject(cloned); 
            saveState();
        });
    }

    function toggleLock() {
        const obj = canvas.getActiveObject();
        if (!obj) return showToast('请先选中图形');
        if (obj.isBase) return showToast('基础图形默认固定');
        if (obj.isTrace) return showToast('痕迹无需固定');

        obj.set({ selectable: false, evented: false, _isLocked: true });
        canvas.discardActiveObject();
        canvas.renderAll();
        saveState();
        showToast('🔒 已固定，点击“解除所有固定”可恢复');
    }

    function unlockAll() {
        let count = 0;
        canvas.getObjects().forEach(obj => {
            if (obj._isLocked) {
                obj.set({ selectable: true, evented: true, _isLocked: false });
                const canMove = (currentMode === 'move');
                obj.set({ lockMovementX: !canMove, lockMovementY: !canMove });
                count++;
            }
        });
        canvas.renderAll();
        saveState();
        if (count > 0) showToast(`🔓 已解除 ${count} 个图形的固定`);
        else showToast('没有已固定的图形');
    }

    function createGhostTrace(obj, state) {
        const commonProps = { 
            left: state.left, top: state.top, angle: state.angle, 
            fill: 'transparent', stroke: '#90A4AE', strokeWidth: 2, 
            strokeDashArray: [6, 4], 
            selectable: true, evented: true, 
            isTrace: true, 
            opacity: 0.5, 
            lockScalingX: true, lockScalingY: true, lockScalingFlip: true,
            hasControls: true, hasBorders: true,
            perPixelTargetFind: true, targetFindTolerance: 5
        };
        if (obj.type === 'polygon') {
            let ghostObj = new fabric.Polygon(obj.points, commonProps);
            canvas.add(ghostObj);
        }
    }

    function saveTrace() {
        const obj = canvas.getActiveObject();
        if (!obj || obj.isTrace || !obj._lastTraceState) return showToast('请先选中并移动图形');
        const state = obj._lastTraceState;
        const hasChanged = (obj.left !== state.left || obj.top !== state.top || obj.angle !== state.angle);
        if (!hasChanged) return showToast('图形位置没变化哦');
        createGhostTrace(obj, state);
        updateTraceState(obj); 
        saveState();
        showToast('✅ 痕迹已保留！');
    }

    function drawCutLine(p1, p2) {
        if (cutLine) canvas.remove(cutLine);
        cutLine = new fabric.Polyline([p1, p2], {
            stroke: '#E53935', strokeWidth: 3, strokeDashArray: [8, 4],
            fill: 'transparent', selectable: false, evented: false, excludeFromExport: true
        });
        canvas.add(cutLine); canvas.renderAll();
    }

    canvas.on('mouse:down', function(opt) {
        if (currentMode === 'cut' && !cutLine) {
            let pointer = canvas.getPointer(opt.e);
            cutStart = { x: pointer.x, y: pointer.y }; 
            cutEnd = { ...cutStart };
            drawCutLine(cutStart, cutEnd);
        }
    });

    canvas.on('mouse:move', function(opt) {
        if (currentMode === 'cut' && cutLine) {
            let pointer = canvas.getPointer(opt.e);
            cutEnd = { x: pointer.x, y: pointer.y };
            drawCutLine(cutStart, cutEnd);
        }
    });

    canvas.on('mouse:up', function(opt) {
        if (currentMode === 'cut' && cutLine) {
            const dx = cutEnd.x - cutStart.x, dy = cutEnd.y - cutStart.y;
            if (Math.sqrt(dx*dx + dy*dy) < 5) canvas.remove(cutLine); 
            else executeCut();
            cutLine = null; cutStart = null; cutEnd = null;
        }
    });

    function executeCut() {
        let p1 = { ...cutStart };
        let p2 = { ...cutEnd };
        
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const len = Math.sqrt(dx*dx + dy*dy);
        if (len < 1) return;

        isCutting = true; 
        let hasCut = false;
        const allPolygons = canvas.getObjects().filter(obj => obj.type === 'polygon' && !obj.isTrace && !obj.isBase);

        allPolygons.forEach(poly => {
            const absPoints = getAbsolutePoints(poly);
            const EPS = 1e-5;
            
            let segmentIntersections = 0;
            for (let i = 0; i < absPoints.length; i++) {
                const curr = absPoints[i];
                const next = absPoints[(i + 1) % absPoints.length];
                const denom = (p1.x - p2.x) * (curr.y - next.y) - (p1.y - p2.y) * (curr.x - next.x);
                if (Math.abs(denom) > EPS) {
                    const t = ((p1.x - curr.x) * (curr.y - next.y) - (p1.y - curr.y) * (curr.x - next.x)) / denom;
                    const u = ((p1.x - curr.x) * (p1.y - p2.y) - (p1.y - curr.y) * (p1.x - p2.x)) / denom;
                    if (t >= -EPS && t <= 1 + EPS && u >= -EPS && u <= 1 + EPS) {
                        segmentIntersections++;
                    }
                }
            }
            
            if (segmentIntersections < 2) return;

            const sides = absPoints.map(p => {
                const cross = (p2.x - p1.x) * (p.y - p1.y) - (p2.y - p1.y) * (p.x - p1.x);
                if (Math.abs(cross) < EPS) return 0;
                return cross > 0 ? 1 : -1;
            });

            let poly1 = [], poly2 = [], intersections = 0;
            for (let i = 0; i < absPoints.length; i++) {
                const curr = absPoints[i], next = absPoints[(i + 1) % absPoints.length];
                const sideCurr = sides[i], sideNext = sides[(i + 1) % absPoints.length];
                if (sideCurr >= 0) poly1.push(curr);
                if (sideCurr <= 0) poly2.push(curr);
                if (sideCurr * sideNext < 0) {
                    const denom = (p1.x - p2.x) * (curr.y - next.y) - (p1.y - p2.y) * (curr.x - next.x);
                    if (Math.abs(denom) > EPS) {
                        const t = ((p1.x - curr.x) * (curr.y - next.y) - (p1.y - curr.y) * (curr.x - next.x)) / denom;
                        const inter = { x: p1.x + t * (p2.x - p1.x), y: p1.y + t * (p2.y - p1.y) };
                        poly1.push(inter); poly2.push(inter); intersections++;
                    }
                }
            }

            if (intersections >= 2 && poly1.length >= 3 && poly2.length >= 3) {
                hasCut = true;
                function createNewPoly(points) {
                    let cx = 0, cy = 0;
                    points.forEach(p => { cx += p.x; cy += p.y; });
                    cx /= points.length; cy /= points.length;
                    points.sort((a, b) => Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx));
                    let minX = Infinity, minY = Infinity;
                    points.forEach(p => { if(p.x < minX) minX = p.x; if(p.y < minY) minY = p.y; });
                    const relPoints = points.map(p => ({ x: p.x - minX, y: p.y - minY }));
                    
                    let newPoly = new fabric.Polygon(relPoints, {
                        left: minX, top: minY, 
                        fill: poly.fill, stroke: poly.stroke, strokeWidth: poly.strokeWidth,
                        shapeType: poly.shapeType + '_cut', isCutPart: true, isBase: false, isTrace: false,
                        opacity: 0.5, 
                        lockMovementX: false, lockMovementY: false, 
                        lockScalingX: true, lockScalingY: true, lockScalingFlip: true, 
                        lockRotation: false, hasControls: true, hasBorders: true,
                        perPixelTargetFind: true, targetFindTolerance: 5 
                    });
                    updateTraceState(newPoly); 
                    return newPoly;
                }
                canvas.remove(poly);
                canvas.add(createNewPoly(poly1)); 
                canvas.add(createNewPoly(poly2));
            }
        });

        if (cutLine) canvas.remove(cutLine);
        
        isCutting = false; 
        canvas.renderAll(); 
        
        if (hasCut) { 
            saveState(); // 剪切完成后保存状态
            showToast('✂️ 剪切成功！'); 
        } else {
            showToast('剪切线未穿过任何图形');
        }
    }

    function submitWork() {
        if (myWorkId) {
            if (!confirm('您已提交过作品，是否覆盖当前作品？')) return;
        }

        showToast('正在生成高清图片...');
        canvas.discardActiveObject(); canvas.renderAll();
        const targetArea = document.getElementById('canvasWrapper');
        
        html2canvas(targetArea, { 
            scale: 2, useCORS: true, backgroundColor: '#FFFFFF', 
            windowWidth: targetArea.scrollWidth, windowHeight: targetArea.scrollHeight 
        }).then(canvasImg => {
            const imgData = canvasImg.toDataURL('image/jpeg', 0.92);
            
            fetch('/api/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: user.username,
                    groupName: currentGroupName,
                    imageBase64: imgData
                })
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    myWorkId = data.workId; 
                    showToast(`✅ ${currentGroupName} 提交成功！`);
                    
                    document.getElementById('previewImg').src = imgData;
                    document.getElementById('workPreviewBox').classList.add('show');
                } else {
                    showToast('提交失败，请重试');
                }
            }).catch(err => {
                console.error(err);
                showToast('网络错误，提交失败');
            });
        }).catch(err => { 
            console.error(err); 
            showToast('截图失败'); 
        });
    }

    function openStudentModal() {
        const imgSrc = document.getElementById('previewImg').src;
        document.getElementById('modalImg').src = imgSrc;
        document.getElementById('studentModal').classList.add('show');
    }

    function closeStudentModal(e) {
        if (e.target.classList.contains('student-modal') || e.target.classList.contains('modal-close')) {
            document.getElementById('studentModal').classList.remove('show');
        }
    }

    function deleteMyWork() {
        if (!myWorkId) return showToast('没有可删除的作品');
        if (!confirm('确定要删除已上传的作品吗？删除后可重新绘制上传。')) return;
        
        fetch(`/api/works/${myWorkId}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ role: 'student', username: user.username })
        }).then(res => res.json()).then(data => {
            if (data.success) {
                myWorkId = null;
                document.getElementById('workPreviewBox').classList.remove('show');
                showToast('🗑️ 作品已删除，教师端已同步');
            } else {
                showToast('删除失败');
            }
        }).catch(() => showToast('网络错误'));
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; 
        toast.style.display = 'block';
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }
    
    document.addEventListener('gesturestart', e => e.preventDefault());
</script>
