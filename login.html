<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平面图形复习 - 登录</title>
    <style>
        body { font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; width: 320px; }
        h2 { color: #ff7e5f; margin-bottom: 30px; font-size: 28px; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ffd1dc; border-radius: 15px; font-size: 16px; box-sizing: border-box; outline: none; background: #fff; }
        select:focus, input:focus { border-color: #ff7e5f; }
        button { width: 100%; padding: 12px; background: linear-gradient(to right, #ff7e5f, #feb47b); color: white; border: none; border-radius: 15px; font-size: 18px; cursor: pointer; margin-top: 15px; font-weight: bold; transition: transform 0.2s; }
        button:hover { transform: scale(1.05); }
        .error { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🌟 图形王国 🌟</h2>
        <select id="username">
            <!-- 需求③：修改为第一小组到第十小组 -->
            <option value="group1">第一小组</option>
            <option value="group2">第二小组</option>
            <option value="group3">第三小组</option>
            <option value="group4">第四小组</option>
            <option value="group5">第五小组</option>
            <option value="group6">第六小组</option>
            <option value="group7">第七小组</option>
            <option value="group8">第八小组</option>
            <option value="group9">第九小组</option>
            <option value="group10">第十小组</option>
            <option value="teacher">教师账号</option>
        </select>
        <input type="password" id="password" value="123456" readonly style="background: #f9f9f9; color: #999;">
        <button onclick="login()">进入课堂</button>
        <p class="error" id="errorMsg"></p>
    </div>
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            fetch('/api/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify({ username: data.username, role: data.role }));
                    window.location.href = data.role === 'teacher' ? 'teacher.html' : 'student.html';
                } else {
                    document.getElementById('errorMsg').textContent = data.message;
                    document.getElementById('errorMsg').style.display = 'block';
                }
            }).catch(err => {
                document.getElementById('errorMsg').textContent = '网络错误，请检查服务器';
                document.getElementById('errorMsg').style.display = 'block';
            });
        }
    </script>
</body>
</html>
